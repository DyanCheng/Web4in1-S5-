services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
      - BACKEND_INTERNAL_URL=http://backend:8080

      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      - NEXT_PUBLIC_SEPAY_BANK_ACCOUNT=${NEXT_PUBLIC_SEPAY_BANK_ACCOUNT:-}
      - NEXT_PUBLIC_SEPAY_BANK_NAME=${NEXT_PUBLIC_SEPAY_BANK_NAME:-Vietcombank}
      - NEXT_PUBLIC_SEPAY_WEBHOOK_URL=${NEXT_PUBLIC_SEPAY_WEBHOOK_URL:-}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SUPABASE_URL=${SUPABASE_URL:-https://tbabfvaohalhmtzrtgty.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}}
      - SEPAY_BANK_ACCOUNT=${SEPAY_BANK_ACCOUNT:-}
      - SEPAY_BANK_NAME=${SEPAY_BANK_NAME:-Vietcombank}
      - SEPAY_PAYMENT_CODE_PREFIX=${SEPAY_PAYMENT_CODE_PREFIX:-CMCTOUR}
      - SEPAY_WEBHOOK_API_KEY=${SEPAY_WEBHOOK_API_KEY:-}
      - ConnectionStrings__DefaultConnection=${SUPABASE_DB_CONNECTION_STRING:-}
      - AI_SERVICE_URL=http://ai_service:8000

  ai_service:
    build:
      context: ./ai_service
    ports:
      - "8000:8000"

